<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FocusTube">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>FocusTube · 勉強BGM</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#2a3344;
  --text:#e6edf3; --sub:#8b97a8; --accent:#3fb6ff; --accent-dim:rgba(63,182,255,.14);
  --ok:#3fb950; --warn:#d29922; --err:#ff7b72;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  min-height:100vh; padding-bottom:env(safe-area-inset-bottom);
}
header{
  position:sticky;top:0;z-index:10;
  background:rgba(13,17,23,.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
header h1{font-size:17px;font-weight:700;letter-spacing:.02em}
header h1 span{color:var(--accent)}
header .badge{font-size:12px;color:var(--sub);border:1px solid var(--line);border-radius:8px;padding:5px 10px}

#playerWrap{
  position:sticky; top:calc(49px + env(safe-area-inset-top)); z-index:9;
  background:#000; aspect-ratio:16/9;
  max-width:680px; margin:0 auto; overflow:hidden;
}
#playerWrap iframe{width:100%;height:100%;display:block}
#poster{
  position:absolute; inset:0; z-index:2; cursor:pointer;
  background-size:cover; background-position:center;
  display:flex; align-items:center; justify-content:center;
}
#poster::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.35)}
#poster.hide{display:none}
#playBtn{
  position:relative; z-index:1;
  width:74px; height:74px; border-radius:50%;
  background:var(--accent); color:#06121c;
  display:flex; align-items:center; justify-content:center;
  font-size:30px; box-shadow:0 6px 24px rgba(0,0,0,.5);
}
#playBtn span{margin-left:5px}

#info{max-width:680px;margin:0 auto;padding:16px 16px 0}
#vTitle{font-size:16px;font-weight:700;line-height:1.5}

#subjCard{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
#subjCard .lbl{font-size:11px;color:var(--sub);letter-spacing:.04em;margin-bottom:10px}
#subjBtns{display:flex;flex-wrap:wrap;gap:7px}
#subjBtns .subj{
  background:var(--panel2);border:1px solid var(--line);color:var(--sub);
  border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;
}
#subjBtns .subj.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.subjList{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.subjList .lbl{font-size:11px;color:var(--sub);letter-spacing:.04em;margin-bottom:11px}
.subjList .row{display:flex;align-items:center;gap:10px;margin-top:9px}
.subjList .row:first-of-type{margin-top:0}
.subjList .nm{font-size:13px;width:50px;min-width:50px;color:var(--text)}
.subjList .barwrap{flex:1;background:var(--panel2);border-radius:6px;height:9px;overflow:hidden}
.subjList .barwrap .b{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#2b7fb8);border-radius:6px;transition:width .3s}
.subjList .tm{font-size:12px;color:var(--sub);min-width:64px;text-align:right;font-variant-numeric:tabular-nums}
.subjList .tm small{margin:0 1px}
.subjList .empty{font-size:12.5px;color:var(--sub)}
#subjTotal .barwrap .b{background:linear-gradient(90deg,var(--warn),#a06f10)}

#stats{margin-top:14px;display:flex;gap:10px}
#stats .stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 10px;text-align:center}
#stats .stat .k{font-size:11px;color:var(--sub);letter-spacing:.04em}
#stats .stat .v{font-size:19px;font-weight:700;margin-top:5px;font-variant-numeric:tabular-nums}
#stats .stat .v small{font-size:12px;color:var(--sub);font-weight:600;margin:0 1px}
#stats .stat.total .v{color:var(--accent)}
#stats .stat.streak .v{color:var(--warn)}

#chartCard{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
#chartTabs{display:flex;gap:6px;margin-bottom:14px}
#chartTabs .tab{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:8px;font-size:13px;font-weight:600;cursor:pointer}
#chartTabs .tab.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
#chart{display:flex;align-items:flex-end;gap:6px;height:152px}
#chart .col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;min-width:0}
#chart .bval{font-size:10px;color:var(--sub);margin-bottom:4px;height:12px;white-space:nowrap;font-variant-numeric:tabular-nums}
#chart .barwrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
#chart .bar{width:72%;max-width:34px;min-height:2px;background:linear-gradient(180deg,var(--accent),#2b7fb8);border-radius:5px 5px 0 0;transition:height .3s}
#chart .col.zero .bar{background:var(--line)}
#chart .blab{font-size:10.5px;color:var(--sub);margin-top:6px;white-space:nowrap}

#resetWrap{text-align:right;margin-top:8px}
#resetBtn{background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;text-decoration:underline;padding:2px 4px}

.controls{max-width:680px;margin:16px auto 0;padding:0 16px;display:flex;gap:10px}
.controls button{
  flex:1;background:var(--panel2);color:var(--text);border:1px solid var(--line);
  border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;
}
.controls button:active{background:var(--panel)}
#bgToggle.on{border-color:var(--ok);color:var(--ok)}
#replay{flex:0 0 auto}
#fsBtn{background:var(--accent);color:#06121c;border-color:var(--accent);font-weight:700}
</style>
</head>
<body>

<header>
  <h1>Focus<span>Tube</span></h1>
  <span class="badge">勉強モード</span>
</header>

<div id="playerWrap">
  <div id="player"></div>
  <div id="poster" style="background-image:url('https://i.ytimg.com/vi/vr9dLvJs7VE/hqdefault.jpg')">
    <div id="playBtn"><span>▶</span></div>
  </div>
</div>

<div id="info">
  <div id="vTitle">読み込み中…</div>

  <div id="subjCard">
    <div class="lbl">📚 いまの教科</div>
    <div id="subjBtns"></div>
  </div>

  <div id="stats">
    <div class="stat total"><div class="k">累計</div><div class="v" id="totalV">0<small>秒</small></div></div>
    <div class="stat"><div class="k">今日</div><div class="v" id="todayV">0<small>秒</small></div></div>
    <div class="stat streak"><div class="k">🔥 連続</div><div class="v" id="streakV">0<small>日</small></div></div>
  </div>
  <div id="subjBreak" class="subjList"></div>
  <div id="subjTotal" class="subjList"></div>
  <div id="chartCard">
    <div id="chartTabs">
      <button class="tab on" data-m="day">日</button>
      <button class="tab" data-m="week">週</button>
      <button class="tab" data-m="month">月</button>
    </div>
    <div id="chart"></div>
  </div>
  <div id="resetWrap"><button id="resetBtn">記録をリセット</button></div>
</div>

<div class="controls">
  <button id="fsBtn">⛶ 全画面で再生</button>
</div>
<div class="controls">
  <button id="playPause">⏸ 一時停止</button>
  <button id="bgToggle" class="on">🌙 BG: ON</button>
  <button id="replay">↺ 頭から</button>
</div>

<!-- 音声セッションを保持するための無音ループ(裏再生の安定化用) -->
<audio id="silence" loop preload="auto" playsinline
  src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQxAADB8AhSmxhIIEVCSiJrDCQBTcu3UrAIwUdkRgQbFAZC1CQEwTJ9mjRvBA4UOLD8nKVOWfh+UlK3z/177OXrfOdKl7pyn3Xf//WreyTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tQxAADB8AhSmxhIIEVCSiJrDCQBTcu3UrAIwUdkRgQbFAZC1CQEwTJ9mjRvBA4UOLD8nKVOWfh+UlK3z/177OXrfOdKl7pyn3Xf//WreyTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tQxAADB8AhSmxhIIEVCSiJrDCQBTcu3UrAIwUdkRgQbFAZC1CQEwTJ9mjRvBA4UOLD8nKVOWfh+UlK3z/177OXrfOdKl7pyn3Xf//WreyTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV"></audio>

<script>
// ▼ 固定する勉強用BGM動画ID(https://youtu.be/vr9dLvJs7VE)
const FIXED_ID = 'vr9dLvJs7VE';

let player = null, apiReady = false;
let currentTitle = '';
let bgEnabled = true, isPlaying = false, posTimer = null;
const $ = id => document.getElementById(id);
const silence = $('silence');

/* ===================== 再生時間の記録(日別) ===================== */
const DAYS_KEY = 'focusTube.single.days';
let days = {};
try{ days = JSON.parse(localStorage.getItem(DAYS_KEY)) || {}; }catch(e){ days = {}; }
let lastCT = null, lastWall = null, statsTimer = null, rafId = null, shownSec = -1, chartMode = 'day';

const dayKey = d => (d || new Date()).toLocaleDateString('sv'); // YYYY-MM-DD(ローカル日付)
function saveDays(){ try{ localStorage.setItem(DAYS_KEY, JSON.stringify(days)); }catch(e){} }

/* ---- 教科ごとの記録 ---- */
const SUBJECTS = ['数学','英語','理科','その他'];
const SUBJ_KEY = 'focusTube.subjects.days';     // { 'YYYY-MM-DD': { 教科: 秒 } }
const SUBJ_CUR_KEY = 'focusTube.subjects.current';
let subjDays = {};
try{ subjDays = JSON.parse(localStorage.getItem(SUBJ_KEY)) || {}; }catch(e){ subjDays = {}; }
let curSubj = localStorage.getItem(SUBJ_CUR_KEY) || SUBJECTS[0];
if (!SUBJECTS.includes(curSubj)) curSubj = SUBJECTS[0];
function saveSubj(){ try{ localStorage.setItem(SUBJ_KEY, JSON.stringify(subjDays)); }catch(e){} }

// 旧バージョンの累計データがあれば引き継ぐ
(function migrate(){
  if (Object.keys(days).length) return;
  const old = parseFloat(localStorage.getItem('focusTube.single.totalSec'));
  if (old > 0){ days[dayKey()] = old; saveDays(); }
})();

function curTime(){
  try{ return (player && player.getCurrentTime) ? player.getCurrentTime() : null; }
  catch(e){ return null; }
}
function isReallyPlaying(){
  try{ return !!(player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING); }
  catch(e){ return false; }
}
// --- 計測(データ): 動画の再生位置と実時刻の「小さい方」だけ加算 ---
function accumulate(){
  const ct = curTime(), now = Date.now();
  if (lastCT != null && lastWall != null && ct != null){
    const add = Math.min(ct - lastCT, (now - lastWall) / 1000);
    if (add > 0 && add < 60){
      const k = dayKey();
      days[k] = (days[k] || 0) + add; saveDays();
      const sd = subjDays[k] || (subjDays[k] = {});
      sd[curSubj] = (sd[curSubj] || 0) + add; saveSubj();
    }
  }
  lastCT = ct; lastWall = now;
}
function paintLoop(){
  rafId = requestAnimationFrame(paintLoop);
  const sec = Math.floor(days[dayKey()] || 0);
  if (sec !== shownSec){ shownSec = sec; renderStats(); }
}
function startStatsLoop(){
  if (!statsTimer){ lastCT = null; lastWall = null; statsTimer = setInterval(accumulate, 1000); }
  if (rafId == null){ shownSec = -1; rafId = requestAnimationFrame(paintLoop); }
}
function stopStatsLoop(){
  accumulate();
  if (statsTimer){ clearInterval(statsTimer); statsTimer = null; }
  if (rafId != null){ cancelAnimationFrame(rafId); rafId = null; }
  lastCT = null; lastWall = null;
}

function fmt(sec){
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
  if (h > 0) return h+'<small>時間</small>'+m+'<small>分</small>';
  if (m > 0) return m+'<small>分</small>'+s+'<small>秒</small>';
  return s+'<small>秒</small>';
}
function fmtShort(sec){
  if (sec >= 3600){ const h = sec/3600; return (h >= 10 ? Math.round(h) : (Math.round(h*10)/10)) + 'h'; }
  if (sec >= 60) return Math.round(sec/60) + 'm';
  return Math.round(sec) + 's';
}

function lastDays(n){
  const arr = [];
  for (let i = n-1; i >= 0; i--){
    const d = new Date(); d.setDate(d.getDate() - i);
    arr.push({ label:(d.getMonth()+1)+'/'+d.getDate(), sec: days[dayKey(d)] || 0 });
  }
  return arr;
}
function weekStart(date){
  const x = new Date(date); const dow = (x.getDay()+6) % 7; // 月曜始まり
  x.setDate(x.getDate() - dow); x.setHours(0,0,0,0); return x;
}
function lastWeeks(n){
  const arr = []; const cur = weekStart(new Date());
  for (let i = n-1; i >= 0; i--){
    const ws = new Date(cur); ws.setDate(ws.getDate() - i*7);
    let sec = 0;
    for (let j = 0; j < 7; j++){ const d = new Date(ws); d.setDate(d.getDate()+j); sec += days[dayKey(d)] || 0; }
    arr.push({ label:(ws.getMonth()+1)+'/'+ws.getDate(), sec });
  }
  return arr;
}
function lastMonths(n){
  const arr = []; const now = new Date();
  for (let i = n-1; i >= 0; i--){
    const m = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const prefix = dayKey(m).slice(0,7); // YYYY-MM
    let sec = 0;
    for (const k in days){ if (k.slice(0,7) === prefix) sec += days[k]; }
    arr.push({ label:(m.getMonth()+1)+'月', sec });
  }
  return arr;
}

function renderChart(){
  const data = chartMode==='day' ? lastDays(7) : chartMode==='week' ? lastWeeks(6) : lastMonths(6);
  const max = Math.max(1, ...data.map(d => d.sec));
  $('chart').innerHTML = data.map(d => {
    const h = d.sec > 0 ? Math.max(4, Math.round(d.sec/max*100)) : 0;
    return '<div class="col'+(d.sec>0?'':' zero')+'">'+
      '<div class="bval">'+(d.sec>0 ? fmtShort(d.sec) : '')+'</div>'+
      '<div class="barwrap"><div class="bar" style="height:'+h+'%"></div></div>'+
      '<div class="blab">'+d.label+'</div></div>';
  }).join('');
}
// 連続記録: 1分以上勉強した日が何日続いているか(今日がまだなら昨日から数える)
function calcStreak(){
  const MIN = 60;
  let streak = 0;
  const d = new Date();
  if (!((days[dayKey(d)] || 0) >= MIN)) d.setDate(d.getDate() - 1);
  while ((days[dayKey(d)] || 0) >= MIN){ streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

function renderSubjBtns(){
  $('subjBtns').innerHTML = SUBJECTS.map(s =>
    '<button class="subj'+(s===curSubj?' on':'')+'" data-s="'+s+'">'+s+'</button>').join('');
  document.querySelectorAll('#subjBtns .subj').forEach(b => {
    b.onclick = () => {
      if (statsTimer) accumulate(); // 切替前にここまでの分を今の教科へ確定
      curSubj = b.dataset.s;
      try{ localStorage.setItem(SUBJ_CUR_KEY, curSubj); }catch(e){}
      document.querySelectorAll('#subjBtns .subj').forEach(x => x.classList.toggle('on', x === b));
    };
  });
}

// 全期間の教科別合計
function aggSubjTotals(){
  const t = {};
  for (const k in subjDays){
    const sd = subjDays[k];
    for (const s in sd){ t[s] = (t[s] || 0) + sd[s]; }
  }
  return t;
}
// 教科ごとの時間をバー付きで描画(sd: {教科:秒})
function renderSubjRows(wrapId, sd, label){
  const rows = Object.keys(sd).map(s => ({ name:s, sec: sd[s] || 0 }))
    .filter(r => r.sec > 0).sort((a,b) => b.sec - a.sec);
  const wrap = $(wrapId);
  if (!rows.length){
    wrap.innerHTML = '<div class="lbl">'+label+'</div><div class="empty">まだ記録がありません</div>';
    return;
  }
  const max = Math.max(...rows.map(r => r.sec));
  wrap.innerHTML = '<div class="lbl">'+label+'</div>' + rows.map(r =>
    '<div class="row"><span class="nm">'+r.name+'</span>'+
    '<span class="barwrap"><span class="b" style="width:'+Math.max(6, Math.round(r.sec/max*100))+'%"></span></span>'+
    '<span class="tm">'+fmt(r.sec)+'</span></div>').join('');
}
function renderSubjBreak(){
  renderSubjRows('subjBreak', subjDays[dayKey()] || {}, '今日の教科別');
  renderSubjRows('subjTotal', aggSubjTotals(), '教科別の累計');
}

function renderStats(){
  const total = Object.values(days).reduce((a,b) => a+b, 0);
  $('totalV').innerHTML = fmt(total);
  $('todayV').innerHTML = fmt(days[dayKey()] || 0);
  $('streakV').innerHTML = calcStreak() + '<small>日</small>';
  renderSubjBreak();
  renderChart();
}

/* ===================== YouTube IFRAME API ===================== */
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = function(){
  apiReady = true;
  createPlayer();
};

function createPlayer(){
  fetchTitle(FIXED_ID);
  player = new YT.Player('player', {
    videoId: FIXED_ID,
    playerVars: { rel:0, playsinline:1, iv_load_policy:3, modestbranding:1 },
    events: {
      onReady: () => {}, // 自動再生はしない(ポスターのタップ or 全画面ボタンで開始)
      onStateChange: onState,
      onError: onError
    }
  });
}

// サムネイル+再生ボタン。タップで確実に再生を開始する
$('poster').onclick = () => {
  if (bgEnabled){ silence.play().catch(()=>{}); }
  if (player && player.playVideo) player.playVideo();
};

function onState(e){
  if (e.data === YT.PlayerState.PLAYING){
    isPlaying = true;
    $('poster').classList.add('hide');
    $('playPause').textContent = '⏸ 一時停止';
    if (bgEnabled){ startSilence(); acquireWake(); }
    updateMediaSession('playing');
    startPositionSync();
    startStatsLoop();
  } else if (e.data === YT.PlayerState.PAUSED){
    isPlaying = false;
    $('playPause').textContent = '▶ 再生';
    updateMediaSession('paused');
    stopPositionSync();
    accumulate();
    releaseWake();
  } else if (e.data === YT.PlayerState.ENDED){
    isPlaying = false;
    $('playPause').textContent = '▶ 再生';
    stopSilence();
    stopPositionSync();
    accumulate();
    releaseWake();
  }
}

function onError(e){
  $('vTitle').textContent = 'この動画は再生できませんでした(エラー' + e.data + ')。埋め込み再生が許可されているか確認してください。';
}

async function fetchTitle(id){
  try{
    const r = await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + id);
    const j = await r.json();
    currentTitle = j.title || ('動画 ' + id);
  }catch(e){
    currentTitle = '動画 ' + id;
  }
  $('vTitle').textContent = currentTitle;
  setMediaMetadata();
}

/* ---- バックグラウンド再生の安定化 ---- */
function startSilence(){ silence.volume = 0; silence.play().catch(()=>{}); }
function stopSilence(){ try{ silence.pause(); }catch(e){} }

let wakeLock = null;
async function acquireWake(){
  if (!('wakeLock' in navigator) || !bgEnabled) return;
  try{
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  }catch(e){}
}
async function releaseWake(){
  try{ if (wakeLock){ const w = wakeLock; wakeLock = null; await w.release(); } }catch(e){}
}

function onVisible(){
  startStatsLoop();
  if (bgEnabled && isPlaying && player){
    try{ if (player.getPlayerState() !== YT.PlayerState.PLAYING) player.playVideo(); }catch(e){}
    acquireWake();
  }
  if (isReallyPlaying()) startPositionSync();
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden'){
    stopStatsLoop();
    stopPositionSync();
  } else {
    onVisible();
  }
});
window.addEventListener('pageshow', () => { if (document.visibilityState !== 'hidden') onVisible(); });
window.addEventListener('pagehide', stopStatsLoop);
window.addEventListener('beforeunload', () => accumulate());

// MediaSession(ロック画面 / 通知のメディア操作)
function setMediaMetadata(){
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: currentTitle || 'FocusTube',
    artist: 'FocusTube',
    artwork: [
      { src:'https://i.ytimg.com/vi/'+FIXED_ID+'/mqdefault.jpg', sizes:'320x180', type:'image/jpeg' },
      { src:'https://i.ytimg.com/vi/'+FIXED_ID+'/hqdefault.jpg', sizes:'480x360', type:'image/jpeg' }
    ]
  });
}
function updateMediaSession(state){
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = state;
}
function setupMediaHandlers(){
  if (!('mediaSession' in navigator)) return;
  const set = (a, fn) => { try{ navigator.mediaSession.setActionHandler(a, fn); }catch(e){} };
  set('play',  () => { if(player) player.playVideo(); });
  set('pause', () => { if(player) player.pauseVideo(); });
  set('seekbackward', d => { if(player) player.seekTo(Math.max(0, player.getCurrentTime() - (d.seekOffset||10)), true); });
  set('seekforward',  d => { if(player) player.seekTo(player.getCurrentTime() + (d.seekOffset||10), true); });
  set('seekto', d => { if(player && d.seekTime!=null) player.seekTo(d.seekTime, true); });
  set('stop',  () => { if(player) player.pauseVideo(); });
}

function startPositionSync(){
  if (!('mediaSession' in navigator) || !('setPositionState' in navigator.mediaSession)) return;
  stopPositionSync();
  posTimer = setInterval(() => {
    try{
      const dur = player.getDuration(), pos = player.getCurrentTime();
      if (dur > 0) navigator.mediaSession.setPositionState({ duration:dur, position:Math.min(pos,dur), playbackRate:1 });
    }catch(e){}
  }, 1000);
}
function stopPositionSync(){ if(posTimer){ clearInterval(posTimer); posTimer = null; } }

/* ---- 動画コントロール ---- */
$('playPause').onclick = () => {
  if (!player) return;
  if (isPlaying) player.pauseVideo(); else player.playVideo();
};
$('bgToggle').onclick = () => {
  bgEnabled = !bgEnabled;
  const b = $('bgToggle');
  b.classList.toggle('on', bgEnabled);
  b.textContent = bgEnabled ? '🌙 BG: ON' : '🌙 BG: OFF';
  if (bgEnabled && isPlaying){ startSilence(); acquireWake(); }
  else { stopSilence(); releaseWake(); }
};
$('replay').onclick = () => { if(player){ player.seekTo(0, true); player.playVideo(); } };
// 再生して全画面にする
$('fsBtn').onclick = () => {
  if (player && player.playVideo) player.playVideo();
  const iframe = (player && player.getIframe) ? player.getIframe() : null;
  // iframe → ラッパーの順で全画面APIを試す(ブラウザ差を吸収)
  const targets = [iframe, $('playerWrap')].filter(Boolean);
  for (const el of targets){
    const req = el.requestFullscreen || el.webkitRequestFullscreen ||
                el.webkitEnterFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req){ try{ req.call(el); return; }catch(e){} }
  }
};
$('resetBtn').onclick = () => {
  if (!confirm('すべての再生記録をリセットしますか?')) return;
  days = {}; saveDays();
  subjDays = {}; saveSubj();
  renderStats();
};

document.querySelectorAll('#chartTabs .tab').forEach(t => {
  t.onclick = () => {
    chartMode = t.dataset.m;
    document.querySelectorAll('#chartTabs .tab').forEach(x => x.classList.toggle('on', x === t));
    renderChart();
  };
});

renderSubjBtns();
renderStats();
setupMediaHandlers();
if (document.visibilityState !== 'hidden') startStatsLoop();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
