<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FocusTube">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>FocusTube</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#2a3344;
  --text:#e6edf3; --sub:#8b97a8; --accent:#3fb6ff; --accent-dim:rgba(63,182,255,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  min-height:100vh; padding-bottom:env(safe-area-inset-bottom);
}
header{
  position:sticky;top:0;z-index:10;
  background:rgba(13,17,23,.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
header h1{font-size:17px;font-weight:700;letter-spacing:.02em}
header h1 span{color:var(--accent)}
#settingsBtn{
  background:none;border:1px solid var(--line);color:var(--sub);
  border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;
}
#setup{padding:28px 20px;max-width:560px;margin:0 auto}
#setup h2{font-size:15px;font-weight:600;margin-bottom:6px}
#setup p{font-size:13px;color:var(--sub);line-height:1.8;margin-bottom:16px}
#plInput{
  width:100%;background:var(--panel);border:1px solid var(--line);
  color:var(--text);border-radius:10px;padding:13px 14px;font-size:15px;
  margin-bottom:12px;outline:none;
}
#plInput:focus{border-color:var(--accent)}
#pasteBtn{
  width:100%;background:var(--accent);color:#06121c;border:none;
  border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;
  margin-bottom:10px;
}
#saveBtn{
  width:100%;background:var(--panel2);color:var(--sub);
  border:1px solid var(--line);border-radius:10px;padding:13px;
  font-size:14px;font-weight:600;cursor:pointer;
}
#setupErr{color:#ff7b72;font-size:13px;margin-top:10px;display:none;line-height:1.7}
#hint{margin-top:22px;font-size:12.5px;color:var(--sub);line-height:1.9;
  background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
#hint b{color:var(--text)}
#playerWrap{
  position:sticky; top:calc(49px + env(safe-area-inset-top)); z-index:9;
  background:#000; aspect-ratio:16/9; display:none;
  max-width:680px; margin:0 auto;
}
#playerWrap iframe{width:100%;height:100%;display:block}
#listWrap{max-width:680px;margin:0 auto;padding:10px 12px 40px}
#listHead{display:flex;align-items:baseline;justify-content:space-between;padding:8px 4px 10px;display:none}
#listHead .count{font-size:12px;color:var(--sub)}
#listHead .label{font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.04em}
.item{
  display:flex;gap:12px;align-items:center;
  background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:10px;margin-bottom:10px;
  cursor:pointer;transition:background .15s,border-color .15s;
}
.item:active{background:var(--panel2)}
.item.playing{border-color:var(--accent);background:var(--accent-dim)}
.thumb{width:118px;min-width:118px;aspect-ratio:16/9;border-radius:8px;object-fit:cover;background:#000}
.meta{flex:1;min-width:0}
.title{
  font-size:13.5px;font-weight:600;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.idx{font-size:11px;color:var(--sub);margin-top:5px}
.item.playing .idx{color:var(--accent)}
#status{padding:30px 16px;text-align:center;color:var(--sub);font-size:13.5px;line-height:1.8;display:none}
</style>
</head>
<body>

<header>
  <h1>Focus<span>Tube</span></h1>
  <div style="display:flex;gap:8px;align-items:center">
    <a href="offline.html" style="color:var(--sub);font-size:13px;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px">オフライン</a>
    <a href="background-player.html" style="color:var(--sub);font-size:13px;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px">1本だけ再生</a>
    <button id="settingsBtn">リスト変更</button>
  </div>
</header>

<div id="setup">
  <h2>勉強用の再生リストを登録</h2>
  <p>YouTubeアプリで再生リストを開いて「共有 → コピー」してから、下のボタンをタップ。</p>
  <button id="pasteBtn">📋 コピーしたURLで始める</button>
  <input id="plInput" type="text" placeholder="または、ここにURLをペースト">
  <button id="saveBtn">このリストで始める</button>
  <div id="setupErr"></div>
  <div id="hint">
    💡 再生リストの公開設定は<b>「限定公開」か「公開」</b>にしてね。「非公開」だとYouTube側の制限で再生できない。
  </div>
</div>

<div id="playerWrap"><div id="player"></div></div>

<div id="listWrap">
  <div id="status"></div>
  <div id="listHead">
    <span class="label">勉強用プレイリスト</span>
    <span class="count" id="count"></span>
  </div>
  <div id="list"></div>
</div>

<script>
const LS_KEY = 'focusTube.playlistId';
const LS_CACHE = 'focusTube.cache.';
let player = null, videoIds = [], currentIdx = -1, apiReady = false, pendingPl = null, manualMode = false;
const $ = id => document.getElementById(id);

function extractId(input){
  input = (input || '').trim();
  const m = input.match(/[?&]list=([A-Za-z0-9_-]+)/);
  if (m) return m[1];
  if (/^(PL|UU|LL|OL|RD)[A-Za-z0-9_-]{8,}$/.test(input)) return input;
  return null;
}

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = function(){
  apiReady = true;
  if (pendingPl) loadPlaylist(pendingPl);
};

function loadPlaylist(plId){
  if (!apiReady){ pendingPl = plId; return; }
  pendingPl = null;
  $('setup').style.display = 'none';
  $('playerWrap').style.display = 'block';
  showStatus('再生リストを読み込み中…');

  if (player){ player.destroy(); player = null; }
  player = new YT.Player('player', {
    playerVars: {
      listType:'playlist', list:plId,
      rel:0, playsinline:1, iv_load_policy:3
    },
    events: {
      onReady: () => pollPlaylist(plId),
      onStateChange: onPlayerState,
      onError: onPlayerError
    }
  });

  const cached = localStorage.getItem(LS_CACHE + plId);
  if (cached){
    try{
      const data = JSON.parse(cached);
      videoIds = data.ids;
      renderList(data.titles);
      hideStatus();
    }catch(e){}
  }
}

function pollPlaylist(plId, tries=0){
  let ids = null;
  try{ ids = player.getPlaylist(); }catch(e){}
  if (ids && ids.length){
    if (JSON.stringify(ids) !== JSON.stringify(videoIds)){
      videoIds = ids;
      renderList(null);
      fetchTitles(plId, ids);
    }
    hideStatus();
    return;
  }
  if (tries > 60){
    showStatus('リストを読み込めなかった😢<br>再生リストの公開設定が「非公開」になっていないか確認してみて。');
    return;
  }
  setTimeout(() => pollPlaylist(plId, tries+1), 250);
}

function onPlayerError(e){
  showStatus('動画を読み込めなかった(エラー' + e.data + ')。<br>リストの公開設定を「限定公開」にして、もう一度試してみて。');
}

async function fetchTitles(plId, ids){
  const titles = {};
  await Promise.all(ids.map(async id => {
    try{
      const r = await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + id);
      const j = await r.json();
      if (j.title) titles[id] = j.title;
    }catch(e){}
  }));
  renderList(titles);
  try{ localStorage.setItem(LS_CACHE + plId, JSON.stringify({ids, titles})); }catch(e){}
}

function renderList(titles){
  const list = $('list');
  list.innerHTML = '';
  $('listHead').style.display = 'flex';
  $('count').textContent = videoIds.length + '本';
  videoIds.forEach((id, i) => {
    const el = document.createElement('div');
    el.className = 'item' + (i === currentIdx ? ' playing' : '');
    el.dataset.idx = i;
    const t = titles && titles[id] ? titles[id] : '動画 ' + (i+1);
    el.innerHTML =
      '<img class="thumb" loading="lazy" src="https://i.ytimg.com/vi/' + id + '/mqdefault.jpg">' +
      '<div class="meta"><div class="title">' + escapeHtml(t) + '</div>' +
      '<div class="idx">' + (i === currentIdx ? '▶ 再生中' : '#' + (i+1)) + '</div></div>';
    el.onclick = () => playAt(i);
    list.appendChild(el);
  });
}

function playAt(i, scroll){
  if (i < 0 || i >= videoIds.length) return;
  manualMode = true;
  currentIdx = i;
  player.loadVideoById(videoIds[i]);
  updatePlaying();
  if (scroll !== false) window.scrollTo({top:0, behavior:'smooth'});
}

function onPlayerState(e){
  if (e.data === YT.PlayerState.PLAYING){
    // 今実際に再生している動画に合わせてリストのハイライトを同期
    try{
      const m = player.getVideoUrl().match(/[?&]v=([A-Za-z0-9_-]+)/);
      if (m){
        const idx = videoIds.indexOf(m[1]);
        if (idx !== -1 && idx !== currentIdx){ currentIdx = idx; updatePlaying(); }
      }
    }catch(err){}
  }
  if (e.data === YT.PlayerState.ENDED && manualMode){
    // 動画が終わったら次の動画へ自動で進む
    if (currentIdx > -1 && currentIdx < videoIds.length - 1) playAt(currentIdx + 1, false);
  }
}

function updatePlaying(){
  document.querySelectorAll('.item').forEach(el => {
    const i = +el.dataset.idx;
    el.classList.toggle('playing', i === currentIdx);
    el.querySelector('.idx').textContent = i === currentIdx ? '▶ 再生中' : '#' + (i+1);
  });
}

function showStatus(msg){ const s = $('status'); s.style.display = 'block'; s.innerHTML = msg; }
function hideStatus(){ $('status').style.display = 'none'; }
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function startWith(raw){
  const id = extractId(raw);
  if (!id){
    const e = $('setupErr');
    e.style.display = 'block';
    e.textContent = 'URLから再生リストIDが見つからなかった。動画単体じゃなくて「再生リスト」のURL(list=を含む)をコピーしてね。';
    return;
  }
  $('setupErr').style.display = 'none';
  localStorage.setItem(LS_KEY, id);
  videoIds = []; currentIdx = -1;
  loadPlaylist(id);
}

$('pasteBtn').onclick = async () => {
  try{
    const text = await navigator.clipboard.readText();
    startWith(text);
  }catch(e){
    $('plInput').focus();
    alert('クリップボードを読めなかったので、入力欄に長押しでペーストしてね');
  }
};
$('saveBtn').onclick = () => startWith($('plInput').value);
$('settingsBtn').onclick = () => {
  $('setup').style.display = 'block';
  $('plInput').value = '';
  $('setupErr').style.display = 'none';
  window.scrollTo(0,0);
};

const saved = localStorage.getItem(LS_KEY);
if (saved) loadPlaylist(saved);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
